<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mastery Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Lexend',sans-serif;
background:linear-gradient(135deg,#020617,#000);
color:white;
}

.glass{
background:rgba(15,23,42,0.9);
border-radius:20px;
padding:25px;
border:1px solid rgba(255,255,255,0.1);
}

.input{
width:100%;
padding:12px;
border-radius:10px;
background:#020617;
border:1px solid #1e293b;
margin-bottom:10px;
}

.btn{
width:100%;
padding:12px;
background:#2563eb;
border-radius:10px;
font-weight:bold;
margin-top:10px;
}

.menu-btn{
display:block;
width:100%;
padding:10px;
margin-bottom:8px;
background:#020617;
border-radius:10px;
text-align:left;
}

.menu-btn:hover{
background:#2563eb;
}

.progresso{
width:100%;
height:12px;
background:#111;
border-radius:10px;
overflow:hidden;
}

.barra{
height:100%;
background:#22c55e;
width:0%;
}

.hidden{
display:none
}

</style>

</head>

<body class="p-4">

<!-- LOGIN -->

<div id="login" class="flex items-center justify-center min-h-screen">

<div class="glass w-full max-w-sm">

<h1 class="text-3xl font-black text-blue-500 text-center">
MASTERY PRO
</h1>

<p class="text-center text-gray-400 mb-4">
Plataforma de Conhecimento
</p>

<form id="loginForm">

<input id="email" class="input" placeholder="Login">
<input id="senha" type="password" class="input" placeholder="Senha">

<button class="btn">Entrar</button>

</form>

<p id="erro" class="text-red-500 hidden">Login inválido</p>

</div>

</div>

<!-- PLATAFORMA -->

<div id="plataforma" class="hidden">

<header class="flex justify-between items-center mb-6">

<h2 class="text-2xl font-bold text-blue-400">
Mastery
</h2>

<button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">
Sair
</button>

</header>

<h2 id="boasvindas" class="text-xl font-bold"></h2>

<p class="text-gray-400">
Progresso do curso
</p>

<div class="progresso">
<div id="barra" class="barra"></div>
</div>

<p id="porcentagem" class="text-gray-400 text-sm mt-1"></p>

<button onclick="abrirQuiz()" class="btn mt-4">
Fazer Quiz Final
</button>

<button onclick="gerarCertificado()" class="btn mt-2">
Gerar Certificado
</button>

<div class="grid md:grid-cols-3 gap-6 mt-6">

<div>

<h3 class="font-bold mb-3">
Conteúdos
</h3>

<button class="menu-btn" onclick="abrirConteudo(1)">Educação Financeira</button>
<button class="menu-btn" onclick="abrirConteudo(2)">Programação</button>
<button class="menu-btn" onclick="abrirConteudo(3)">Empreendedorismo</button>
<button class="menu-btn" onclick="abrirConteudo(4)">Mentalidade</button>
<button class="menu-btn" onclick="abrirConteudo(5)">Produtividade</button>

</div>

<div class="md:col-span-2">

<h3 id="titulo" class="text-2xl font-bold"></h3>

<p id="texto" class="text-gray-300 mt-4 leading-relaxed whitespace-pre-line"></p>

<button onclick="concluirAula()" class="btn mt-6">
Marcar Conteúdo Concluído
</button>

<div id="quizArea" class="hidden mt-6">

<h3 class="text-xl font-bold mb-4">
Quiz Final
</h3>

<div id="quiz"></div>

<button onclick="corrigirQuiz()" class="btn mt-4">
Enviar Quiz
</button>

<p id="resultadoQuiz" class="mt-3 font-bold"></p>

</div>

</div>

</div>

</div>

<script>

const usuarios=[

{email:"D",senha:"999000999",nome:"Administrador"},
{email:"ksksksksk",senha:"92929292",nome:"Aluno"},
{email:"aluno01",senha:"11111111",nome:"Aluno"},
{email:"aluno02",senha:"22222222",nome:"Aluno"}

]

const conteudos={

1:{titulo:"Educação Financeira",texto:`Educação financeira é uma habilidade essencial para qualquer pessoa que deseja ter uma vida estável e tranquila. Muitas pessoas passam a vida inteira trabalhando muito, mas mesmo assim acabam enfrentando problemas financeiros. Isso acontece porque nunca aprenderam a administrar o dinheiro corretamente.

Quando você entende educação financeira, começa a perceber como o dinheiro funciona. Aprende que não basta apenas ganhar dinheiro, é preciso saber como gastar, como poupar e como investir.

Uma das primeiras lições da educação financeira é entender a diferença entre necessidade e desejo. Muitas vezes as pessoas compram coisas que não precisam apenas por impulso. Isso pode causar problemas financeiros no futuro.

Outro ponto muito importante é aprender a poupar dinheiro. Guardar uma parte do que você ganha pode parecer difícil no começo, mas com o tempo se torna um hábito muito poderoso.

Além disso, a educação financeira também ensina sobre investimentos. Investir significa fazer o dinheiro trabalhar para você. Existem várias formas de investimento, como renda fixa, ações, fundos e outros tipos de aplicações.

Quando uma pessoa desenvolve inteligência financeira, ela consegue planejar melhor o futuro. Pode criar uma reserva de emergência, investir para aposentadoria e alcançar objetivos importantes.`},

2:{titulo:"Programação",texto:`Programação é a habilidade de ensinar computadores a realizar tarefas. Basicamente, programar significa escrever instruções que o computador consegue entender.

Hoje em dia quase tudo depende de programação. Aplicativos de celular, redes sociais, jogos, sistemas bancários e até carros modernos utilizam programação.

Aprender programação desenvolve muito o raciocínio lógico. Isso acontece porque programar exige pensar de forma organizada e resolver problemas passo a passo.

Existem várias linguagens de programação, como JavaScript, Python, Java e C++. Cada linguagem possui suas próprias características e usos.

Uma das vantagens da programação é que ela permite criar coisas incríveis. Um programador pode desenvolver aplicativos, criar plataformas online, automatizar tarefas e até construir inteligência artificial.

Além disso, a programação é uma das habilidades mais valorizadas no mercado de trabalho moderno. Empresas de tecnologia estão sempre procurando profissionais que saibam programar.

Com dedicação e prática, qualquer pessoa pode aprender programação. O segredo é estudar, praticar e criar projetos.`},

3:{titulo:"Empreendedorismo",texto:`Empreendedorismo é a capacidade de identificar oportunidades e transformá-las em soluções que geram valor para outras pessoas.

Um empreendedor observa problemas no mundo e pensa em maneiras de resolvê-los. Muitas empresas famosas começaram exatamente assim.

Empreender exige criatividade, coragem e persistência. Nem sempre as coisas funcionam na primeira tentativa, mas cada erro traz aprendizado.

Além disso, empreendedores precisam entender o mercado. Isso significa estudar clientes, concorrentes e tendências.

Quando um empreendedor cria algo útil para as pessoas, ele pode gerar impacto positivo na sociedade e também construir sucesso financeiro.`},

4:{titulo:"Mentalidade",texto:`A mentalidade de crescimento é a ideia de que habilidades podem ser desenvolvidas com esforço e prática.

Pessoas com essa mentalidade não desistem facilmente. Quando enfrentam dificuldades, elas veem isso como uma oportunidade de aprender.`},

5:{titulo:"Produtividade",texto:`Produtividade é a capacidade de realizar tarefas de forma eficiente. Não significa trabalhar mais horas, mas sim trabalhar melhor.`}

}

const perguntas=[

{p:"O que é educação financeira?",r:["Controlar dinheiro","Gastar tudo"],c:0},
{p:"Programação serve para?",r:["Criar sistemas","Nada"],c:0},
{p:"Empreendedor resolve?",r:["Problemas","Nada"],c:0},
{p:"Produtividade significa?",r:["Trabalhar melhor","Perder tempo"],c:0},
{p:"Mentalidade de crescimento?",r:["Aprender sempre","Desistir"],c:0},
{p:"Internet ajuda a?",r:["Aprender","Nada"],c:0},
{p:"Investir significa?",r:["Fazer dinheiro crescer","Perder dinheiro"],c:0},
{p:"Empreender exige?",r:["Persistência","Preguiça"],c:0},
{p:"Programação usa?",r:["Lógica","Sorte"],c:0},
{p:"Educação ajuda?",r:["Desenvolvimento","Nada"],c:0}

]

let progresso=0
let quizAprovado=false

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault()

let email=document.getElementById("email").value
let senha=document.getElementById("senha").value

let user=usuarios.find(u=>u.email===email && u.senha===senha)

if(!user){
document.getElementById("erro").classList.remove("hidden")
return
}

document.getElementById("login").classList.add("hidden")
document.getElementById("plataforma").classList.remove("hidden")

document.getElementById("boasvindas").innerText="Bem-vindo "+user.nome

})

function abrirConteudo(id){

document.getElementById("titulo").innerText=conteudos[id].titulo
document.getElementById("texto").innerText=conteudos[id].texto

}

function concluirAula(){

progresso+=20
if(progresso>100)progresso=100

document.getElementById("barra").style.width=progresso+"%"
document.getElementById("porcentagem").innerText=progresso+"% concluído"

}

function abrirQuiz(){

if(progresso<100){
alert("Complete os conteúdos primeiro")
return
}

let html=""

perguntas.forEach((q,i)=>{

html+=`<p class="mt-3">${i+1}. ${q.p}</p>`

q.r.forEach((r,j)=>{

html+=`<label><input type="radio" name="q${i}" value="${j}"> ${r}</label><br>`

})

})

document.getElementById("quiz").innerHTML=html
document.getElementById("quizArea").classList.remove("hidden")

}

function corrigirQuiz(){

let pontos=0

perguntas.forEach((q,i)=>{

let r=document.querySelector(`input[name="q${i}"]:checked`)

if(r && parseInt(r.value)==q.c){
pontos++
}

})

if(pontos>=7){

quizAprovado=true
document.getElementById("resultadoQuiz").innerText="Você passou no quiz!"

}else{

document.getElementById("resultadoQuiz").innerText="Você não passou. Tente novamente."

}

}

function gerarCertificado(){

if(!quizAprovado){
alert("Passe no quiz primeiro")
return
}

let nome=document.getElementById("boasvindas").innerText.replace("Bem-vindo ","")

let w=window.open()

w.document.write(`

<html>
<body style="font-family:Arial;text-align:center;padding:40px;background:#f4f4f4">

<div style="background:white;padding:40px;border:8px solid gold">

<h1>CERTIFICADO</h1>

<p>Certificamos que</p>

<h2>${nome}</h2>

<p>concluiu o curso da plataforma</p>

<h2>MASTERY PRO</h2>

<p>Data: ${new Date().toLocaleDateString()}</p>

</div>

</body>
</html>

`)

}

function logout(){
location.reload()
}

</script>

</body>
</html>
