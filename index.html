<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mastery Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Lexend',sans-serif;
background:linear-gradient(135deg,#020617,#000);
color:white;
}

.glass{
background:rgba(15,23,42,0.9);
border-radius:20px;
padding:25px;
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}

.input{
width:100%;
padding:12px;
border-radius:10px;
background:#020617;
border:1px solid #1e293b;
margin-bottom:10px;
}

.btn{
width:100%;
padding:12px;
background:#2563eb;
border-radius:10px;
font-weight:bold;
margin-top:10px;
}

.menu-btn{
display:block;
width:100%;
padding:10px;
margin-bottom:8px;
background:#020617;
border-radius:10px;
text-align:left;
}

.menu-btn:hover{
background:#2563eb;
}

.video{
width:100%;
aspect-ratio:16/9;
border-radius:16px;
overflow:hidden;
border:1px solid #1e293b;
}

.progresso{
width:100%;
height:12px;
background:#111;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.barra{
height:100%;
background:#22c55e;
width:0%;
}

.hidden{display:none}

</style>

</head>

<body class="p-4">

<!-- LOGIN -->

<div id="login" class="flex items-center justify-center min-h-screen">

<div class="glass w-full max-w-sm">

<h1 class="text-3xl font-black text-blue-500 text-center">MASTERY PRO</h1>

<p class="text-center text-gray-400 mb-4">Plataforma de aulas</p>

<form id="loginForm">

<input id="email" class="input" placeholder="Login">

<input id="senha" type="password" class="input" placeholder="Senha">

<button class="btn">Entrar</button>

</form>

<p id="erro" class="text-red-500 hidden">Login inválido</p>

</div>

</div>

<!-- PLATAFORMA -->

<div id="plataforma" class="hidden">

<header class="flex justify-between items-center mb-6">

<h2 class="text-2xl font-bold text-blue-400">Mastery</h2>

<button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Sair</button>

</header>

<h2 id="boasvindas" class="text-xl font-bold"></h2>

<p class="text-gray-400">Progresso do curso</p>

<div class="progresso">
<div id="barra" class="barra"></div>
</div>

<p id="porcentagem" class="text-gray-400 text-sm mt-1"></p>

<div class="grid md:grid-cols-3 gap-6 mt-6">

<!-- MENU -->

<div>

<h3 class="font-bold mb-3">Aulas</h3>

<button class="menu-btn" onclick="abrirAula(1)">Educação Financeira</button>

<button class="menu-btn" onclick="abrirAula(2)">Programação</button>

<button class="menu-btn" onclick="abrirAula(3)">Empreendedorismo</button>

<button class="menu-btn" onclick="abrirAula(4)">Mentalidade</button>

</div>

<!-- CONTEUDO -->

<div class="md:col-span-2">

<div class="video">

<iframe id="video" width="100%" height="100%" allowfullscreen></iframe>

</div>

<h3 id="titulo" class="text-2xl font-bold mt-4"></h3>

<p id="texto" class="text-gray-400 mt-2"></p>

<button onclick="concluirAula()" class="btn mt-4">Marcar Aula Concluída</button>

</div>

</div>

</div>

<script>

const usuarios=[

{email:"D",senha:"999000999",nome:"Administrador"},

{email:"ksksksksk",senha:"92929292",nome:"Aluno"},
{email:"aluno01",senha:"11111111",nome:"Aluno"},
{email:"aluno02",senha:"22222222",nome:"Aluno"},
{email:"aluno03",senha:"33333333",nome:"Aluno"},
{email:"aluno04",senha:"44444444",nome:"Aluno"},
{email:"aluno05",senha:"55555555",nome:"Aluno"}

]

const aulas={

1:{
titulo:"Educação Financeira",
video:"https://www.youtube.com/embed/TaV6zVQ2d8E",
texto:"Educação financeira é aprender a controlar o dinheiro. Muitas pessoas trabalham muito mas acabam gastando tudo sem planejamento. Quando você aprende a administrar seu dinheiro, começa a economizar e investir melhor."
},

2:{
titulo:"Programação",
video:"https://www.youtube.com/embed/8mei6uVttho",
texto:"Programação é a habilidade de criar softwares e sites. Hoje praticamente tudo funciona com programação."
},

3:{
titulo:"Empreendedorismo",
video:"https://www.youtube.com/embed/7XkY9n0u3yU",
texto:"Empreender é criar algo que resolva problemas para outras pessoas."
},

4:{
titulo:"Mentalidade",
video:"https://www.youtube.com/embed/fM2QdC9d2sQ",
texto:"A mentalidade de crescimento ajuda você a persistir mesmo quando as coisas ficam difíceis."
}

}

let progresso=0

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault()

let email=document.getElementById("email").value
let senha=document.getElementById("senha").value

let user=usuarios.find(u=>u.email===email && u.senha===senha)

if(!user){
document.getElementById("erro").classList.remove("hidden")
return
}

/* ADMIN UNIVERSAL */

if(email==="D"){

window.usuario=email

document.getElementById("login").classList.add("hidden")
document.getElementById("plataforma").classList.remove("hidden")

document.getElementById("boasvindas").innerText="Bem-vindo Administrador"

return
}

/* BLOQUEIO ALUNOS */

if(localStorage.getItem("sessao_"+email)){
alert("Conta já está em uso")
return
}

localStorage.setItem("sessao_"+email,"online")

window.usuario=email

document.getElementById("login").classList.add("hidden")
document.getElementById("plataforma").classList.remove("hidden")

document.getElementById("boasvindas").innerText="Bem-vindo "+user.nome

})

function abrirAula(id){

document.getElementById("video").src=aulas[id].video
document.getElementById("titulo").innerText=aulas[id].titulo
document.getElementById("texto").innerText=aulas[id].texto

}

function concluirAula(){

progresso+=25

if(progresso>100)progresso=100

document.getElementById("barra").style.width=progresso+"%"
document.getElementById("porcentagem").innerText=progresso+"% concluído"

}

function logout(){

localStorage.removeItem("sessao_"+window.usuario)

location.reload()

}

</script>

</body>
</html>
